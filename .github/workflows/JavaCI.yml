name: Java CI

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - closed
  schedule:
    - cron: '30 17 * * *'
  workflow_dispatch:
    inputs:
      java_version:
        description: 'Java Version'
        required: true
        default: '21'
      build_goal:
        description: 'Maven Goal'
        required: true
        default: 'clean package'

jobs:
  build-and-run:
    if: github.event.pull_request.merged == true || github.event_name == 'push' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ github.event.inputs.java_version || '21' }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ github.event.inputs.java_version || '21' }}

      - name: Build with Maven
        working-directory: demo
        run: mvn -B ${{ github.event.inputs.build_goal || 'clean package' }}

      - name: Detect input-requiring classes
        run: |
          grep -rlE 'Scanner|System\.console\(|BufferedReader\(.*System\.in' demo/src/main/java/ > input_classes.txt || true
          cat input_classes.txt

      - name: Run classes requiring input (dynamic input)
        run: |
          while read -r file; do
            [ -z "$file" ] && continue
            class=$(echo "$file" | sed 's|.*/java/||;s|/|.|g;s|\.java$||')
            echo "Detected input for class: $class"
            # Count the number of Scanner input calls
            num_inputs=$(grep -o 'next[a-zA-Z]*(' "$file" | wc -l)
            # Generate random values for each input
            input_str=""
            for i in $(seq 1 $num_inputs); do
              if [ "$i" -eq 1 ]; then
                val=$((RANDOM % 100)) # Always int for first input
              else
                case $((RANDOM % 7)) in
                  0) val=$(awk -v seed=$RANDOM 'BEGIN{srand(seed); printf "%.2f", rand()*100}');; # double/float
                  1) val=$(head /dev/urandom | tr -dc A-Za-z | head -c 5);; # string
                  2) val=$([ $((RANDOM % 2)) -eq 0 ] && echo true || echo false);; # boolean
                  3) val=$(head /dev/urandom | tr -dc A-Za-z | head -c 1);; # char
                  4) val=$((RANDOM * 10000));; # long
                  5) val=$(awk -v seed=$RANDOM 'BEGIN{srand(seed); printf "%.3f", rand()*10}');; # float
                  6) val=$(head /dev/urandom | tr -dc A-Za-z | head -c 8);; # another string
                esac
              fi
              input_str="$input_str$val\n"
            done
            echo -e "$input_str" | java -cp demo/target/classes "$class"
          done < input_classes.txt

      - name: Run all detected classes with main()
        working-directory: demo
        run: |
          echo "Running all classes that expose main() in target/classes"
          mkdir -p target/execution
          report=target/execution/all-main-output.html
          echo "<!doctype html><html><body><h1>Main Class Execution Output</h1><pre>" > "$report"
          for classfile in $(find target/classes -type f -name '*.class'); do
            class=$(echo "$classfile" | sed 's|target/classes/||;s|/|.|g;s|\.class$||')
            echo "Running $class" >> "$report"
            echo -e "1\n2\n3\n4\n5\n6\n7\n8" | java -cp target/classes "$class" >> "$report" 2>&1 || echo "(Error running $class)" >> "$report"
            echo "" >> "$report"
          done
          echo "</pre></body></html>" >> "$report"

      - name: Upload main output report artifact
        uses: actions/upload-artifact@v4
        with:
          name: main-execution-report
          path: demo/target/execution/all-main-output.html

      - name: Run tests and generate report
        working-directory: demo
        run: mvn -B test

      - name: Generate HTML surefire report
        working-directory: demo
        run: mvn -B surefire-report:report

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            demo/target/site/surefire-report.html
            demo/target/surefire-reports
            demo/target/execution/all-main-output.html

  docker:
    needs: build-and-run
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: artifacts

      - name: Prepare email attachments
        run: |
          echo "Downloaded artifact tree:"
          find artifacts -maxdepth 5 -type f | sort
          cd artifacts
          zip -r ../attachments.zip .

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./demo
          file: ./demo/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/java252:latest
      
      - name : Email Docker image build report and Java build Test report
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }} # This is the SMTP server address that will be used to send the email. It is stored as a secret in the GitHub repository for security reasons.
          server_port: ${{ secrets.SMTP_PORT }} # This is the port number for the SMTP server. It is also stored as a secret in the GitHub repository.
          username: ${{ secrets.SMTP_USERNAME }} # This is the username for authenticating with the SMTP server. It is stored as a secret in the GitHub repository.
          password: ${{ secrets.SMTP_PASSWORD }} # This is the password for authenticating with the SMTP server. It is stored as a secret in the GitHub repository.
          subject: Java Docker Image Build Report And Java Build Test Report # This is the subject line of the email that will be sent. It indicates that the email contains a report about the Java Docker image build and the Java build tests.
          body: |
            The Java Docker image has been built and pushed to Docker Hub successfully.
            Image Name: ${{ secrets.DOCKER_USERNAME }}/java252:latest
            Please find the attached test report for the Java build.
            The scheduled Java pipeline has completed. 
            Please find the test report attached.
          to: chaitanyassm@outlook.com
          from: ${{ secrets.SMTP_FROM }} # This is the email address that will appear as the sender of the email. It is stored as a secret in the GitHub repository.
          attachments: attachments.zip
          # Attach the generated zip bundle containing all downloaded build artifacts.  