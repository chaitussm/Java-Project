---
name: Java CI
#name = The name of the workflow, which will be displayed in the GitHub Actions interface.
#JAva CI = This is a descriptive name indicating that this workflow is for continuous integration of Java code.

on: 

# on root key specifies the events that trigger the workflow. In this case, the workflow is triggered by four types of events:
  push:
    branches:
      - main
  pull_request:
    types:
      - closed
  schedule:
    - cron: '30 17 * * *' # 11:00 PM IST daily
  workflow_dispatch:
    inputs:
      java_version:
        description: 'Java Version'
        required: true
        default: '21'
      build_goal:
        description: 'Maven Goal'
        required: true
        default: 'clean package'

jobs: 
# container fro one or more jobs that will be executed as part of the workflow. Each job can run on a different runner and can have its own set of steps.
  build-and-run:
  # This is the identifier for the job. You can choose any name for your job, but it should be descriptive of what the job does. In this case, "build-and-run" indicates that this job will handle building and running the Java code.
    if: github.event.pull_request.merged == true || github.event_name == 'push' || github.event_name == 'schedule'
    # This condition ensures that the job will only run if the pull request has been merged, or if the event is a push or a scheduled event. This prevents the job from running on pull request events that are not merged.
    runs-on: ubuntu-latest
    # This specifies the type of runner that the job will run on. In this case, it will run on the latest version of Ubuntu available in GitHub's hosted runners.

    steps:
    # array of job steps that will be executed sequentially. Each step can run a command or use an action.
      - name: Checkout repository
      # label for next step which checks out the repository code so that it can be built and tested in subsequent steps.
        uses: actions/checkout@v4
      # action reference to the official GitHub Action for checking out code from a repository. The '@v4' indicates that it is using version 4 of the action.

      - name: Set up JDK ${{ github.event.inputs.java_version || '21' }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin # here temurin is the Eclipse Temurin build of OpenJDK.
          java-version: ${{ github.event.inputs.java_version || '21' }}

      - name: Build with Maven
        working-directory: demo
        run: mvn -B ${{ github.event.inputs.build_goal || 'clean package' }}

      - name: Detect input-requiring classes
        run: |
          grep -rlE 'Scanner|System\\.console\\(|BufferedReader\\(.*System\\.in' demo/src/main/java/ > input_classes.txt || true
          cat input_classes.txt

      - name: Run classes requiring input
        run: |
            while read -r file; do
              [ -z "$file" ] && continue
              class=$(echo "$file" | sed 's|.*/java/||;s|/|.|g;s|\\.java$||')
              echo "Detected input for class: $class"
              read -p "Enter input for $class: " USER_INPUT
              echo "$USER_INPUT" | java -cp demo/target/classes "$class"
            done < input_classes.txt

      - name: Run all detected classes with main()
        working-directory: demo
        run: |
          echo "Running all classes that expose main() in target/classes"
          mkdir -p target/execution 
          report=target/execution/all-main-output.html
          cat > "$report" <<'HTML'
          <!doctype html>

          </html>
          HTML

      - name: Upload main output report artifact
        uses: actions/upload-artifact@v4
        with:
          name: main-execution-report
          path: demo/target/execution/all-main-output.html

      - name: Run tests and generate report # step label for running tests and generating a report.
        working-directory: demo
        run: mvn -B test # This command runs the tests defined in the Maven project. The '-B' flag stands for "batch mode," which is used to run Maven in a non-interactive mode, suitable for CI environments.

      - name: Generate HTML surefire report
        working-directory: demo
        run: mvn -B surefire-report:report # Create HTML test report under target/site/surefire-report.html

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            demo/target/site/surefire-report.html
            demo/target/surefire-reports
            demo/target/execution/all-main-output.html

  docker:
    needs: build-and-run
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: artifacts

      - name: Prepare email attachments
        run: |
          echo "Downloaded artifact tree:"
          find artifacts -maxdepth 5 -type f | sort
          cd artifacts
          zip -r ../attachments.zip .

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./demo
          file: ./demo/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/java252:latest

      - name : Email Docker image build report and Java build Test report
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }} # This is the SMTP server address that will be used to send the email. It is stored as a secret in the GitHub repository for security reasons.
          server_port: ${{ secrets.SMTP_PORT }} # This is the port number for the SMTP server. It is also stored as a secret in the GitHub repository.
          username: ${{ secrets.SMTP_USERNAME }} # This is the username for authenticating with the SMTP server. It is stored as a secret in the GitHub repository.
          password: ${{ secrets.SMTP_PASSWORD }} # This is the password for authenticating with the SMTP server. It is stored as a secret in the GitHub repository.
          subject: Java Docker Image Build Report And Java Build Test Report # This is the subject line of the email that will be sent. It indicates that the email contains a report about the Java Docker image build and the Java build tests.
          body: |
            The Java Docker image has been built and pushed to Docker Hub successfully.
            Image Name: ${{ secrets.DOCKER_USERNAME }}/java252:latest
            Please find the attached test report for the Java build.
            The scheduled Java pipeline has completed. 
            Please find the test report attached.
          to: chaitanyassm@outlook.com
          from: ${{ secrets.SMTP_FROM }} # This is the email address that will appear as the sender of the email. It is stored as a secret in the GitHub repository.
          attachments: attachments.zip
          # Attach the generated zip bundle containing all downloaded build artifacts.  
